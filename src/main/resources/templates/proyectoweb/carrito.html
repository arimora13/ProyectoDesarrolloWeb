<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Carrito | Proyecto Web CRS Door</title>


<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
    <style>
        body {
            padding-top: 80px;
            background-color: #f5f6fa;
        }

        .card-custom {
            border: none;
            border-radius: 15px;
        }

        .table th {
            background-color: #343a40;
            color: white;
        }

        .table td {
            vertical-align: middle;
        }

        .btn-danger {
            border-radius: 8px;
        }

        .resumen-box {
            background: white;
            border-radius: 15px;
        }

        .titulo {
            font-weight: bold;
        }

        .precio {
            color: #28a745;
            font-weight: bold;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
    <div class="container">
      <a th:href="@{/proyectoweb/productos}" class="nav-link text-white">
    ← Seguir comprando
</a>
        
<li class="nav-item">
<a class="nav-link" th:href="@{/proyectoweb}">Inicio</a>
</li>

        <div class="ml-auto">
            <a th:href="@{/carrito/ver}" class="nav-link text-white">
                <i class="fas fa-shopping-cart"></i> Carrito
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">

        <div class="col-lg-8 mb-4">
            <div class="card card-custom shadow-sm">
                <div class="card-body p-0">

                    <table class="table mb-0">
                        <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th>Cantidad</th>
                            <th>Subtotal</th>
                            <th>Acción</th>
                        </tr>
                        </thead>

                        <tbody>

                        <tr th:each="item : ${items}">
                            <td>
                                <span class="titulo"
                                      th:text="${item.producto.nombre}">Producto</span>
                            </td>

                            <td class="precio"
                                th:text="'₡' + ${item.producto.precio}">₡0</td>

                            <td>
                                <span class="badge badge-secondary"
                                      th:text="${item.cantidad}">1</span>
                            </td>

                            <td class="precio"
                                th:text="'₡' + ${item.producto.precio * item.cantidad}">₡0</td>

                            <td>
                                <a th:href="@{'/carrito/eliminar/' + ${item.producto.idProducto}}"
                                   class="btn btn-danger btn-sm">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </td>
                        </tr>

                        <tr th:if="${items == null or #lists.isEmpty(items)}">
                            <td colspan="5" class="text-center text-muted p-4">
                                <i class="fas fa-shopping-cart fa-2x mb-2"></i><br>
                                El carrito está vacío
                            </td>
                        </tr>

                        </tbody>
                    </table>

                </div>
            </div>
        </div>

       
        <div class="col-lg-4">
            <div class="resumen-box p-4 shadow-sm">

                <h4 class="titulo mb-4">
                    <i class="fas fa-receipt"></i> Resumen
                </h4>

                <p>
                    <strong>Total productos:</strong><br>
                    <span th:text="${items != null ? #aggregates.sum(items.![cantidad]) : 0}">0</span>
                </p>

                <hr>

                <p>
                    <strong>Total a pagar:</strong><br>
                    <span class="h4 precio"
                          th:text="'₡' + ${total}">₡0</span>
                </p>

                <hr>

                <a th:href="@{/carrito/finalizar}" class="btn btn-success">
    Finalizar Compra
</a>

            </div>
        </div>

    </div>
</div>

</body>
</html>
