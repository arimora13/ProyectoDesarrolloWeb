<style>


:root {
  --azul-claro: #669BBC;
  --azul-brillante: #003049;
  --blanco: #FFFFFF;

  --texto: #1c2b36;
  --texto-suave: #5b6b77;

  --sombra: 0 10px 35px rgba(0,0,0,0.08);
  --radio: 10px;
  --radio-lg: 16px;
}

/* BASE */
body {
  font-family: 'Georgia','Times New Roman',serif;
  color: var(--texto);
  background: linear-gradient(160deg,#E9F1FA 0%,#f6fbff 100%);
  padding-top: 20px;

  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* CONTENEDOR CENTRAL */
.auth-section{
  min-height:calc(100vh - 80px);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px 20px;
}

/* TARJETA */
.auth-card{
  max-width:480px;
  width:100%;
  margin:auto;

  background:var(--blanco);
  border-radius:var(--radio-lg);
  padding:45px 45px 50px 45px;

  box-shadow:var(--sombra);
  border-top:5px solid var(--azul-brillante);
}

/* TITULO */
.auth-card h2{
  font-size:28px;
  font-weight:700;
  margin-bottom:28px;
  text-align:center;
  color:#13374a;
  letter-spacing:0.5px;
}

/* TEXTO DE PROYECTO WEB */
.navbar-brand{
  font-size:1.4rem;
  font-weight:700;
  letter-spacing:1px;
  color:#003049;
}
.navbar-brand:focus{
    color:#0099cc;
}
/* LABELS */
label{
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
  color:#27475a;
  letter-spacing:0.4px;
}

/* CAMPOS */
.form-control{
  border:1.6px solid #d7e4ef;
  border-radius:var(--radio);
  padding:11px 14px;
  font-size:0.95rem;

  margin-bottom:18px;
}

.form-control:focus{
  border-color:var(--azul-brillante);
  box-shadow:0 0 0 3px rgba(0,171,228,0.18);
}

/* TEXTO */
.auth-card p{
  margin-top:10px;
  margin-bottom:18px;
  color:var(--texto-suave);
}

/* BOTON */
.btn-crs{
  background:var(--azul-brillante);
  border:2px solid var(--azul-brillante);
  color:white !important;

  width:100%;
  padding:12px;
  margin-top:10px;
  margin-bottom:22px;

  font-weight:600;
  border-radius:var(--radio);
  transition:all .2s ease;
}

.btn-crs:hover{
  background:#0099cc;
  border-color:#0099cc;
}

/* LINKS */
.auth-card a{
  color:var(--azul-brillante);
  font-weight:600;
}

.auth-card a:hover{
  text-decoration:underline;
}

/* FOOTER */
.footer-crs{
  margin-top:auto;
}

</style>
</head>

<section class="auth-section">
    <div class="container">
        <div class="auth-card shadow">
            <h2 class="text-center font-weight-bold mb-4">Iniciar sesión</h2>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="text" name="username" class="form-control" placeholder="Ingrese su correo" required/>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required/>
                </div>

                <div th:if="${param.error}" class="alert alert-danger">Correo o contraseña incorrectos.</div>
                <div th:if="${param.logout}" class="alert alert-success">Sesión cerrada correctamente.</div>

                <button type="submit" class="btn btn-info btn-block text-white">Ingresar</button>
            </form>

            <div class="text-center mt-4">
                <span>¿No tienes cuenta?</span>
                <a th:href="@{/proyectoweb/registro}">Regístrate aquí</a>
            </div>
        </div>
    </div>
</section>

<footer class="footer-crs">
    <div class="container text-center">
        <small>© 2026 Proyecto Web CRS Door</small>
    </div>
</footer>
