 <style>

/* NUEVA PALETA */
:root {
  --azul-claro: #669BBC;
  --azul-brillante: #003049;
  --blanco: #FFFFFF;

  --texto: #1c2b36;
  --texto-suave: #5b6b77;

  --sombra: 0 10px 35px rgba(0,0,0,0.08);
  --radio: 10px;
  --radio-lg: 16px;
}

/* BASE */
body{
  font-family:'Georgia','Times New Roman',serif;
  color:var(--texto);
  background:linear-gradient(160deg,#E9F1FA 0%,#f6fbff 100%);
  padding-top:20px;

  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* CENTRADO */
.auth-section{
  min-height:calc(100vh - 80px);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px 20px;
}

/* TARJETA */
.auth-card{
  max-width:700px;
  width:100%;
  margin:auto;

  background:var(--blanco);
  border-radius:var(--radio-lg);
  padding:45px 55px 50px 55px;

  box-shadow:var(--sombra);
  border-top:5px solid var(--azul-brillante);
}

/* TITULO */
.auth-card h2{
  font-size:28px;
  font-weight:700;
  margin-bottom:30px;
  text-align:center;
  color:#13374a;
  letter-spacing:0.5px;
}

/* PROYECTO WEB */
.navbar-brand{
  font-size:1.4rem;
  font-weight:700;
  letter-spacing:1px;
  color:#003049;
}
.navbar-brand:focus{
    color:#0099cc;
}
/* LABELS */
label{
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
  color:#27475a;
  letter-spacing:0.4px;
}

/* INPUTS */
.form-control{
  border:1.6px solid #d7e4ef;
  border-radius:var(--radio);
  padding:11px 14px;
  font-size:0.95rem;

  margin-bottom:20px;
}

.form-control:focus{
  border-color:var(--azul-brillante);
  box-shadow:0 0 0 3px rgba(0,171,228,0.18);
}

/* BOTON */
.btn-crs{
  background:var(--azul-brillante);
  border:2px solid var(--azul-brillante);
  color:white !important;

  width:100%;
  padding:12px;
  margin-top:10px;
  margin-bottom:24px;

  font-weight:600;
  border-radius:var(--radio);
}

.btn-crs:hover{
  background:#0099cc;
}

/* TEXTO */
.auth-card p{
  margin-top:12px;
  color:var(--texto-suave);
}

/* LINKS */
.auth-card a{
  color:var(--azul-brillante);
  font-weight:600;
}

.auth-card a:hover{
  text-decoration:underline;
}

/* FOOTER */
.footer-crs{
  margin-top:auto;
}

</style>
</head>

<section class="auth-section">
    <div class="container">
        <div class="auth-card shadow">
            <h2 class="text-center font-weight-bold mb-4">Registro de usuario</h2>

            <form th:action="@{/proyectoweb/registro}" th:object="${usuario}" method="post">
                <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required/>
                    </div>
                    <div class="form-group col-md-6">
                        <label>Apellidos</label>
                        <input type="text" th:field="*{apellidos}" class="form-control" required/>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Correo electrónico</label>
                        <input type="email" th:field="*{correo}" class="form-control" required/>
                    </div>
                    <div class="form-group col-md-6">
                        <label>Teléfono</label>
                        <input type="text" th:field="*{telefono}" class="form-control"/>
                    </div>
                </div>

                <div class="form-group">
                    <label>Dirección</label>
                    <input type="text" th:field="*{direccion}" class="form-control"/>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" th:field="*{password}" class="form-control" required/>
                </div>

                <button type="submit" class="btn btn-info btn-block text-white">Crear cuenta</button>
            </form>

            <div class="text-center mt-4">
                <span>¿Ya tienes cuenta?</span>
                <a th:href="@{/login}">Inicia sesión</a>
            </div>
        </div>
    </div>
</section>

<footer class="footer-crs">
    <div class="container text-center">
        <small>© 2026 Proyecto Web CRS Door</small>
    </div>
</footer>
</body>
