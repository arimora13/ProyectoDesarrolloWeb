<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Formulario usuario | Proyecto Web CRS Door</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
    <style>
        body{font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;padding-top:76px;background:#f8fafc;}
        .navbar-crs{background:rgba(15,23,42,.95);}
        .page-banner{background:linear-gradient(135deg,#0f172a,#1e40af);color:#fff;padding:80px 0 60px;}
        .section-crs{padding:85px 0;}
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-crs fixed-top">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/proyectoweb}">Proyecto Web</a>
    </div>
</nav>

<section class="page-banner">
    <div class="container">
        <h1 class="font-weight-bold" th:text="${usuario.idUsuario == null ? 'Nuevo usuario' : 'Editar usuario'}">
            Formulario usuario
        </h1>
        <p>Creación y edición de usuarios administradores y normales.</p>
    </div>
</section>

<section class="section-crs">
    <div class="container">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <form th:action="@{/admin/usuarios/guardar}" th:object="${usuario}" method="post">
                    <input type="hidden" th:field="*{idUsuario}"/>

                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label>Nombre</label>
                            <input type="text" th:field="*{nombre}" class="form-control" required/>
                        </div>
                        <div class="form-group col-md-6">
                            <label>Apellidos</label>
                            <input type="text" th:field="*{apellidos}" class="form-control" required/>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label>Correo</label>
                            <input type="email" th:field="*{correo}" class="form-control" required/>
                        </div>
                        <div class="form-group col-md-6">
                            <label>Teléfono</label>
                            <input type="text" th:field="*{telefono}" class="form-control"/>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Dirección</label>
                        <input type="text" th:field="*{direccion}" class="form-control"/>
                    </div>

                    <div class="form-row">
                        <div class="form-group col-md-4">
                            <label>Contraseña</label>
                            <input type="password" th:field="*{password}" class="form-control" required/>
                        </div>

                        <div class="form-group col-md-4">
                            <label>Rol</label>
                            <select th:field="*{rol}" class="form-control">
                                <option value="ROLE_USER">Usuario normal</option>
                                <option value="ROLE_ADMIN">Administrador</option>
                            </select>
                        </div>

                        <div class="form-group col-md-4">
                            <label>Activo</label>
                            <select th:field="*{activo}" class="form-control">
                                <option th:value="true">Sí</option>
                                <option th:value="false">No</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/admin/usuarios/listado}" class="btn btn-secondary rounded-pill px-4">
                            Volver
                        </a>
                        <button type="submit" class="btn btn-info text-white rounded-pill px-4">
                            Guardar usuario
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
</body>
</html>
