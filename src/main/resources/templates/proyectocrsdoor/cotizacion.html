<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="general/proyectocrsdoor_fragmentos :: head"></head>
<body>
<header th:replace="general/proyectocrsdoor_fragmentos :: header"></header>
 
        <section class="page-banner">
<div class="container">
<h1>Solicitud de cotización</h1>
<p>Formulario para productos, servicios o proyectos.</p>
</div>
</section>
 
        <section class="section-crs">
<div class="container">
<div class="row justify-content-center">
<div class="col-lg-8">
<div class="card-crs">
<form>
<div class="form-row">
<div class="form-group col-md-6">
<label>Nombre completo</label>
<input type="text" class="form-control"/>
</div>
<div class="form-group col-md-6">
<label>Empresa</label>
<input type="text" class="form-control"/>
</div>
</div>
 
                                <div class="form-row">
<div class="form-group col-md-6">
<label>Correo electrónico</label>
<input type="email" class="form-control"/>
</div>
<div class="form-group col-md-6">
<label>Teléfono</label>
<input type="text" class="form-control"/>
</div>
</div>
 
                                <div class="form-group">
<label>Tipo de solicitud</label>
<select class="form-control">
<option>Producto</option>
<option>Servicio</option>
<option>Proyecto</option>
</select>
</div>
 
                                <div class="form-group">
<label>Detalle del requerimiento</label>
<textarea class="form-control" rows="6"></textarea>
</div>
 
                                <div class="form-group">
<label>Dirección de obra / proyecto</label>
<input type="text" class="form-control"/>
</div>
 
                                <button type="submit" class="btn btn-crs btn-lg">Enviar cotización</button>
</form>
</div>
</div>
</div>
</div>
</section>
 
        <footer th:replace="general/proyectocrsdoor_fragmentos :: footer"></footer>
</body>
</html>
