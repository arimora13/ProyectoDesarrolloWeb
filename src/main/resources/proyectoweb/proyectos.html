<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Proyectos | Proyecto Web CRS Door</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
    <style>
        body{font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;padding-top:76px;}
        .navbar-crs{background:rgba(15,23,42,.95);}
        .page-banner{background:linear-gradient(135deg,#0f172a,#1e40af);color:#fff;padding:80px 0 60px;}
        .section-crs{padding:85px 0;}
        .project-image-placeholder{height:240px;background:#dbeafe;color:#1e3a8a;display:flex;align-items:center;justify-content:center;font-weight:700;}
        .footer-crs{background:#020617;color:#cbd5e1;padding:30px 0;}
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-crs fixed-top">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/proyectoweb}">Proyecto Web</a>
    </div>
</nav>

<section class="page-banner">
    <div class="container">
        <h1 class="font-weight-bold">Proyectos</h1>
        <p>Galería de trabajos realizados.</p>
    </div>
</section>

<section class="section-crs">
    <div class="container">
        <div class="row">
            <div class="col-md-6 col-lg-4 mb-4" th:each="i : ${#numbers.sequence(1,6)}">
                <div class="card border-0 shadow-sm h-100">
                    <div class="project-image-placeholder">Proyecto</div>
                    <div class="card-body">
                        <h5 class="card-title">Proyecto destacado</h5>
                        <p class="card-text">Instalación de puertas, herrajes y acabados para espacio comercial o industrial.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="footer-crs">
    <div class="container text-center"><small>© 2026 Proyecto Web CRS Door</small></div>
</footer>
</body>
</html>
