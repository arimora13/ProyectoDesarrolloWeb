<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registro | Proyecto Web CRS Door</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
    <style>
        body{font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;padding-top:76px;background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);}
        .navbar-crs{background:rgba(15,23,42,.95);}
        .auth-section{padding:90px 0;min-height:calc(100vh - 76px);}
        .auth-card{max-width:760px;margin:0 auto;background:#fff;border-radius:18px;padding:32px;box-shadow:0 12px 35px rgba(15,23,42,.10);}
        .footer-crs{background:#020617;color:#cbd5e1;padding:30px 0;}
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-crs fixed-top">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/proyectoweb}">Proyecto Web</a>
    </div>
</nav>

<section class="auth-section">
    <div class="container">
        <div class="auth-card shadow">
            <h2 class="text-center font-weight-bold mb-4">Registro de usuario</h2>

            <form th:action="@{/proyectoweb/registro}" th:object="${usuario}" method="post">
                <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required/>
                    </div>
                    <div class="form-group col-md-6">
                        <label>Apellidos</label>
                        <input type="text" th:field="*{apellidos}" class="form-control" required/>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Correo electrónico</label>
                        <input type="email" th:field="*{correo}" class="form-control" required/>
                    </div>
                    <div class="form-group col-md-6">
                        <label>Teléfono</label>
                        <input type="text" th:field="*{telefono}" class="form-control"/>
                    </div>
                </div>

                <div class="form-group">
                    <label>Dirección</label>
                    <input type="text" th:field="*{direccion}" class="form-control"/>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" th:field="*{password}" class="form-control" required/>
                </div>

                <button type="submit" class="btn btn-info btn-block text-white">Crear cuenta</button>
            </form>

            <div class="text-center mt-4">
                <span>¿Ya tienes cuenta?</span>
                <a th:href="@{/login}">Inicia sesión</a>
            </div>
        </div>
    </div>
</section>

<footer class="footer-crs">
    <div class="container text-center">
        <small>© 2026 Proyecto Web CRS Door</small>
    </div>
</footer>
</body>
</html>
