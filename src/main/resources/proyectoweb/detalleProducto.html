<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Formulario producto | Proyecto Web CRS Door</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
    <style>
        body{font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;padding-top:76px;}
        .navbar-crs{background:rgba(15,23,42,.95);}
        .page-banner{background:linear-gradient(135deg,#0f172a,#1e40af);color:#fff;padding:80px 0 60px;}
        .section-crs{padding:85px 0;}
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-crs fixed-top">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/proyectoweb}">Proyecto Web</a>
    </div>
</nav>

<section class="page-banner">
    <div class="container">
        <h1 class="font-weight-bold" th:text="${producto.idProducto == null ? 'Nuevo producto' : 'Editar producto'}">Formulario producto</h1>
        <p>Solo accesible para administradores.</p>
    </div>
</section>

<section class="section-crs">
    <div class="container">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <form th:action="@{/admin/productos/guardar}" th:object="${producto}" method="post">
                    <input type="hidden" th:field="*{idProducto}"/>

                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label>Nombre</label>
                            <input type="text" th:field="*{nombre}" class="form-control" required/>
                        </div>

                        <div class="form-group col-md-6">
                            <label>Categoría</label>
                            <select th:field="*{categoria}" class="form-control" required>
                                <option value="">Seleccione una categoría</option>
                                <option th:each="c : ${categorias}" th:value="${c.idCategoria}" th:text="${c.nombre}">Categoría</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea th:field="*{descripcion}" class="form-control" rows="4" required></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group col-md-4">
                            <label>Precio</label>
                            <input type="number" step="0.01" th:field="*{precio}" class="form-control" required/>
                        </div>
                        <div class="form-group col-md-4">
                            <label>Stock</label>
                            <input type="number" th:field="*{stock}" class="form-control" required/>
                        </div>
                        <div class="form-group col-md-4">
                            <label>Ficha técnica</label>
                            <input type="text" th:field="*{fichaTecnica}" class="form-control" placeholder="/uploads/ficha.pdf"/>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label>Imagen</label>
                            <input type="text" th:field="*{imagen}" class="form-control" placeholder="/uploads/imagen.jpg"/>
                        </div>
                        <div class="form-group col-md-3">
                            <label>Resistencia al fuego</label>
                            <select th:field="*{resistenciaFuego}" class="form-control">
                                <option th:value="true">Sí</option>
                                <option th:value="false">No</option>
                            </select>
                        </div>
                        <div class="form-group col-md-3">
                            <label>Activo</label>
                            <select th:field="*{activo}" class="form-control">
                                <option th:value="true">Sí</option>
                                <option th:value="false">No</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/admin/productos/listado}" class="btn btn-secondary rounded-pill px-4">Volver</a>
                        <button type="submit" class="btn btn-info text-white rounded-pill px-4">Guardar producto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
</body>
</html>
