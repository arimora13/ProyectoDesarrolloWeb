<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Administrar productos | Proyecto Web CRS Door</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
    <style>
        body{font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;padding-top:76px;}
        .navbar-crs{background:rgba(15,23,42,.95);}
        .page-banner{background:linear-gradient(135deg,#0f172a,#1e40af);color:#fff;padding:80px 0 60px;}
        .section-crs{padding:85px 0;}
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-crs fixed-top">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/proyectoweb}">Proyecto Web</a>
    </div>
</nav>

<section class="page-banner">
    <div class="container">
        <h1 class="font-weight-bold">Administrar productos</h1>
        <p>Mantenimiento completo para usuarios administradores.</p>
    </div>
</section>

<section class="section-crs">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0">Listado de productos</h3>
            <a th:href="@{/admin/productos/nuevo}" class="btn btn-info text-white rounded-pill px-4">Nuevo producto</a>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-hover bg-white shadow-sm">
                <thead class="thead-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Activo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${productos}">
                        <td th:text="${p.idProducto}">1</td>
                        <td th:text="${p.nombre}">Nombre</td>
                        <td th:text="${p.categoria.nombre}">Categoría</td>
                        <td>₡<span th:text="${#numbers.formatDecimal(p.precio,1,2)}">0.00</span></td>
                        <td th:text="${p.stock}">0</td>
                        <td th:text="${p.activo ? 'Sí' : 'No'}">Sí</td>
                        <td>
                            <a th:href="@{/admin/productos/editar/{idProducto}(idProducto=${p.idProducto})}" class="btn btn-warning btn-sm">Editar</a>
                            <a th:href="@{/admin/productos/eliminar/{idProducto}(idProducto=${p.idProducto})}" class="btn btn-danger btn-sm">Eliminar</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(productos)}">
                        <td colspan="7" class="text-center">No hay productos registrados.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
